# Cloudbase-Init configuration file
#
# This `cloudbase-init.conf` file is used during the first boot of the VM created from the Proxmox template, that was created using this repo (via Packer).
# It is used to configure Cloudbase-Init to perform various tasks such as setting the hostname, configuring the network, and setting the administrator password.
#
# For more information about the available options, please refer to the official documentation:
# https://cloudbase-init.readthedocs.io/en/latest/config.html

[DEFAULT]
username=Administrator
groups=Administrators
inject_user_password=true
first_logon_behaviour=no
rename_admin_user=true

bsdtar_path=C:\Program Files\Cloudbase Solutions\Cloudbase-Init\bin\bsdtar.exe
mtools_path=C:\Program Files\Cloudbase Solutions\Cloudbase-Init\bin\

verbose=true
debug=true
log_dir=C:\Program Files\Cloudbase Solutions\Cloudbase-Init\log\
log_file=cloudbase-init.log
default_log_levels=comtypes=INFO,suds=INFO,iso8601=WARN,requests=WARN
logging_serial_port_settings=COM1,115200,N,8

mtu_use_dhcp_config=true
ntp_use_dhcp_config=true
trim_enabled=true
local_scripts_path=C:\Program Files\Cloudbase Solutions\Cloudbase-Init\LocalScripts\
winrm_enable_basic_auth=true
winrm_configure_https_listener=true
winrm_configure_http_listener=false

metadata_services=cloudbaseinit.metadata.services.configdrive.ConfigDriveService, cloudbaseinit.metadata.services.nocloudservice.NoCloudConfigDriveService

# UserDataPlugin and SetUserPasswordPlugin probably must be AFTER CreateUserPlugin,
#  otherwise user ends with a random password even if one is provided via metadata or userdata.
plugins=cloudbaseinit.plugins.common.mtu.MTUPlugin, cloudbaseinit.plugins.common.trim.TrimConfigPlugin, cloudbaseinit.plugins.windows.ntpclient.NTPClientPlugin, cloudbaseinit.plugins.common.sethostname.SetHostNamePlugin, cloudbaseinit.plugins.windows.extendvolumes.ExtendVolumesPlugin, cloudbaseinit.plugins.windows.createuser.CreateUserPlugin, cloudbaseinit.plugins.common.userdata.UserDataPlugin, cloudbaseinit.plugins.common.setuserpassword.SetUserPasswordPlugin, cloudbaseinit.plugins.common.sshpublickeys.SetUserSSHPublicKeysPlugin, cloudbaseinit.plugins.common.networkconfig.NetworkConfigPlugin, cloudbaseinit.plugins.windows.winrmlistener.ConfigWinRMListenerPlugin, cloudbaseinit.plugins.windows.winrmcertificateauth.ConfigWinRMCertificateAuthPlugin, cloudbaseinit.plugins.common.localscripts.LocalScriptsPlugin, cloudbaseinit.plugins.windows.licensing.WindowsLicensingPlugin, cloudbaseinit.plugins.windows.updates.WindowsAutoUpdatesPlugin

allow_reboot=true
stop_service_on_exit=false
check_latest_version=false
